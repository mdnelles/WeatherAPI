# Pre-certbot HTTP-only Nginx config for the weather app.
#
# Install:
#   sudo cp nginx/weather.conf /etc/nginx/sites-available/weather
#   sudo ln -s /etc/nginx/sites-available/weather /etc/nginx/sites-enabled/weather
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a cert (certbot will rewrite this file to add the :443 server block):
#   sudo certbot --nginx -d weather.example.com

server {
    listen 80;
    listen [::]:80;

    server_name weather.mikenelles.com;

    # Let certbot write ACME challenge files here (harmless if unused).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reasonable upload size for API posts (tweak if needed).
    client_max_body_size 10m;

    # Gzip common text types.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache Next.js build assets aggressively (immutable, hashed filenames).
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3033;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files served from Next.js.
    location /static/ {
        proxy_pass http://127.0.0.1:3033;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else goes to the Next.js app on PM2.
    location / {
        proxy_pass http://127.0.0.1:3033;
        proxy_http_version 1.1;

        # Required headers for Next.js / WebSockets / real client IP.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_cache_bypass $http_upgrade;
    }
}
