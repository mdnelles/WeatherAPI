name: Deploy Weather App

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # Opt in to Node 24 for JS-based actions (silences the Node 20 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy on server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/var/www/weather"
            BRANCH="main"
            REPO_URL="${{ secrets.REPO_URL }}"

            # Load nvm if present so node/pnpm/pm2 are on PATH for non-interactive shells
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # First-time clone if directory is empty
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "--> First-time setup: cloning repo into $APP_DIR"
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "--> Pulling latest code"
            git fetch --all
            git reset --hard "origin/$BRANCH"

            echo "--> Ensuring pnpm + pm2 are installed"
            corepack enable || npm i -g pnpm
            command -v pm2 >/dev/null 2>&1 || npm i -g pm2

            echo "--> Installing dependencies"
            pnpm install --frozen-lockfile

            echo "--> Building Next.js"
            pnpm build

            echo "--> Starting / reloading PM2"
            if pm2 describe weather > /dev/null 2>&1; then
              pm2 reload ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js
            fi

            pm2 save

            echo "--> Deployment complete"
